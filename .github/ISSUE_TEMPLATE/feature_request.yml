name: Feature request
description: Suggest an enhancement or new capability.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Lead with the *problem* you're trying to solve —
        knowing the underlying use case helps us see whether the proposed solution is
        the right shape, or whether something else would fit better.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the situation, what you tried, and where kioku-mesh fell short.
        Concrete is better than abstract.
      placeholder: |
        I have three machines on Tailscale and ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine kioku-mesh could address this. CLI sketch / config snippet welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other tools you've tried, or other ways kioku-mesh could solve the same
        problem. Why this proposal over those?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Roughly which area?
      options:
        - Single-host / local backend
        - Multi-host mesh (Zenoh / RocksDB / replication)
        - MCP integration (Claude Code / Codex / Gemini / other)
        - mTLS / security
        - CLI ergonomics / docs
        - Observability (status / doctor / save_coverage)
        - Not sure / other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
