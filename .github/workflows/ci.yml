name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install zenohd
        run: |
          echo "deb [trusted=yes] https://download.eclipse.org/zenoh/debian-repo/ /" \
            | sudo tee /etc/apt/sources.list.d/zenoh.list
          sudo apt update
          sudo apt install -y zenoh

      - name: Install package + dev/test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,test]'

      - name: Run pre-commit (all hooks)
        uses: pre-commit/action@v3.0.1

      - name: Run pytest
        run: pytest tests/ -v --tb=short -n auto
