# systemd drop-in override for the apt-installed zenohd.service
#
# Install:
#   sudo mkdir -p /etc/systemd/system/zenohd.service.d/
#   sudo cp docs/systemd-zenohd-override.example.conf \
#       /etc/systemd/system/zenohd.service.d/override.conf
#   # Edit User= and ExecStart= for your environment:
#   sudo $EDITOR /etc/systemd/system/zenohd.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl enable --now zenohd.service
#
# %h expands to the home directory of the user set in User= below.
# Replace "gisen" with the actual user that owns the mesh-mem checkout.

[Service]
# EDIT: replace "gisen" with your username
User=gisen
Group=gisen

# %h is resolved from User= above, so no hardcoded paths needed.
Environment=ZENOH_BACKEND_ROCKSDB_ROOT=%h/.local/share/mesh-mem
Environment=RUST_LOG=zenoh=info

# Reset the base unit's ExecStart before providing the new one.
ExecStart=
# EDIT: replace with the absolute path to your mesh-mem config.
# For the office host, change zenohd_home.json5 → zenohd_office.json5.
ExecStart=/usr/bin/zenohd -c %h/work/mesh-mem/config/zenohd_home.json5

Restart=on-failure
RestartSec=5s
